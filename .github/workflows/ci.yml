name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check erpnext_mexico/
      - run: ruff format --check erpnext_mexico/

  test-standalone:
    name: Tests (standalone)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install satcfdi
      - name: Run standalone tests
        run: python -m pytest erpnext_mexico/erpnext_mexico/tests/ -v --tb=short -k "not frappe"
